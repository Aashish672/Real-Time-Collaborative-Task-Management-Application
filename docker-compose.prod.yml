version: "3.8"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: taskflow
    env_file:
      - .env
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data_prod:/var/lib/rabbitmq

  # Migration (run manually in CI/CD)
  migration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - ./backend/uploads:/app/uploads

  email-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: python -m app.worker.email_worker
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_started

  webhook-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: python -m app.worker.webhook_worker
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_started

volumes:
  postgres_data_prod:
  redis_data_prod:
  rabbitmq_data_prod: