version: '3.8'

services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: tf-db-prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: taskflow
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: tf-redis-prod
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tf-rabbitmq-prod
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data_prod:/var/lib/rabbitmq

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tf-api-prod
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - ./backend/uploads:/app/uploads

  # Workers
  email-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tf-email-worker-prod
    restart: always
    command: python -m app.worker.email_worker
    env_file:
      - .env.prod
    depends_on:
      rabbitmq:
        condition: service_started

  webhook-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tf-webhook-worker-prod
    restart: always
    command: python -m app.worker.webhook_worker
    env_file:
      - .env.prod
    depends_on:
      rabbitmq:
        condition: service_started

volumes:
  postgres_data_prod:
  redis_data_prod:
  rabbitmq_data_prod:
